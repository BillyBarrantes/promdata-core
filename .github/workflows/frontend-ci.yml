name: Frontend CI

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "app/**"
      - "components/**"
      - "hooks/**"
      - "lib/**"
      - "public/**"
      - "styles/**"
      - "e2e/**"
      - "middleware.ts"
      - "next.config.mjs"
      - "package.json"
      - "pnpm-lock.yaml"
      - "playwright.config.ts"
      - ".github/workflows/frontend-ci.yml"
      - "Dockerfile"
      - ".dockerignore"
  pull_request:
    paths:
      - "app/**"
      - "components/**"
      - "hooks/**"
      - "lib/**"
      - "public/**"
      - "styles/**"
      - "e2e/**"
      - "middleware.ts"
      - "next.config.mjs"
      - "package.json"
      - "pnpm-lock.yaml"
      - "playwright.config.ts"
      - ".github/workflows/frontend-ci.yml"
      - "Dockerfile"
      - ".dockerignore"
  workflow_dispatch:

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://ci-placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
      # [FIX 2026-06-11] Alineado con los mocks de E2E (localhost:8000).
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      NEXT_PUBLIC_DEBUG_MIDDLEWARE: "0"
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.15.1

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build

  e2e-crossfilter:
    name: E2E Crossfilter Smoke
    runs-on: ubuntu-latest
    needs: frontend-build
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://ci-placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
      # [FIX 2026-06-11] E2E tests mock http://localhost:8000/api/v1/**
      # (see e2e/happy-path-analysis.spec.ts). Si NEXT_PUBLIC_API_BASE_URL
      # apunta a 127.0.0.1, los mocks no interceptan y los fetch fallan
      # con "Failed to fetch" (connection refused). Usar localhost alinea
      # con el patron de mocking. /qa/crossfilter no llama al backend
      # (datos hardcoded), por lo que no se requiere servidor uvicorn.
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      NEXT_PUBLIC_DEBUG_MIDDLEWARE: "0"
      NEXT_TELEMETRY_DISABLED: "1"
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:3005
      CI: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.15.1

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E crossfilter smoke
        run: pnpm test:e2e:crossfilter

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-artifacts-crossfilter
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

  e2e-happy-path:
    name: E2E Happy Path Analysis
    runs-on: ubuntu-latest
    needs: frontend-build
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://ci-placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
      # [FIX 2026-06-11] Ver e2e-crossfilter job arriba: el mock usa
      # localhost:8000. NEXT_PUBLIC_API_BASE_URL debe coincidir.
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      NEXT_PUBLIC_DEBUG_MIDDLEWARE: "0"
      NEXT_TELEMETRY_DISABLED: "1"
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:3005
      CI: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.15.1

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E happy-path analysis
        run: pnpm test:e2e:happy-path

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-artifacts-happy-path
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
