name: Backend CI

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  workflow_dispatch:

jobs:
  backend-tests:
    name: Backend Test Suite
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    env:
      GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "backend/requirements.txt"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create Google Cloud credentials file
        if: env.GCP_CREDENTIALS != ''
        run: |
          printf '%s' "$GCP_CREDENTIALS" > google-credentials.json
          chmod 600 google-credentials.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=${{ github.workspace }}/backend/google-credentials.json" >> "$GITHUB_ENV"

      - name: Run backend test suite
        run: ./run_backend_tests.sh
