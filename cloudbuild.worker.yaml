steps:
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-worker-image'
    args:
      - 'build'
      - '--file=backend/Dockerfile'
      - '--tag=gcr.io/$PROJECT_ID/promdata-backend:$COMMIT_SHA'
      - '--tag=gcr.io/$PROJECT_ID/promdata-backend:latest'
      - 'backend'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-worker-image'
    args:
      - 'push'
      - '--all-tags'
      - 'gcr.io/$PROJECT_ID/promdata-backend'
    waitFor: ['build-worker-image']

  - name: 'gcr.io/google.com/cloudsdktool/google-cloud-cli:stable'
    id: 'deploy-worker-pool'
    entrypoint: gcloud
    args:
      - 'beta'
      - 'run'
      - 'worker-pools'
      - 'deploy'
      - 'promdata-worker'
      - '--project=promdata-enterprise'
      - '--region=us-east4'
      - '--image=gcr.io/$PROJECT_ID/promdata-backend:$COMMIT_SHA'
      - '--min-instances=0'
      - '--max-instances=15'
      - '--cpu=4'
      - '--memory=16Gi'
      - '--command=celery'
      - '--args=^|^-A|app.celery_app|worker|--loglevel=info|--pool=prefork|--concurrency=20|--max-tasks-per-child=50|-Ofair|--prefetch-multiplier=1|-Q|default,analysis,background'
      - '--update-env-vars=^|^REDIS_MAX_CONNECTIONS_RATE_LIMIT=20|REDIS_MAX_CONNECTIONS_AI_CACHE=20|REDIS_MAX_CONNECTIONS_HEALTHCHECK=5|REDIS_MAX_CONNECTIONS_DEFAULT=20|CELERY_BROKER_POOL_LIMIT=20|CELERY_RESULT_BACKEND_MAX_CONNECTIONS=20|GEMINI_RETRY_MAX_RETRIES=3|GEMINI_RETRY_BASE_DELAY_SECONDS=1.0|GEMINI_RETRY_MAX_DELAY_SECONDS=15.0|GEMINI_RETRY_JITTER_SECONDS=0.5'
    waitFor: ['push-worker-image']

images:
  - 'gcr.io/$PROJECT_ID/promdata-backend:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/promdata-backend:latest'

options:
  logging: CLOUD_LOGGING_ONLY
